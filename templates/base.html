<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

/* BODY */
body{
background:#020617;
color:white;
line-height:1.5;
}

/* NAVBAR */
nav{
position:sticky;
top:0;
backdrop-filter:blur(10px);
background:rgba(2,6,23,0.7);
border-bottom:1px solid rgba(255,255,255,0.05);
z-index:100;
}

.nav-container{
max-width:1100px;
margin:auto;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:relative;
}

/* LOGO */
.logo{
font-size:22px;
font-weight:700;
}

.logo span{
color:#22c55e;
}

/* LINKS */
.nav-links{
display:flex;
gap:25px;
font-size:14px;
}

.nav-links a{
text-decoration:none;
color:#cbd5f5;
transition:0.2s;
}

.nav-links a:hover{
color:white;
}

/* RIGHT SIDE */
.nav-right{
display:flex;
align-items:center;
gap:15px;
}

/* BUTTON */
.nav-btn{
padding:8px 14px;
border-radius:10px;
background:#22c55e;
color:#020617;
border:none;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

.nav-btn:hover{
background:#16a34a;
}

.nav-btn.secondary{
background:transparent;
color:#22c55e;
border:1px solid #22c55e;
}

.nav-btn.secondary:hover{
background:#22c55e;
color:#020617;
}

/* USER TEXT */
.user-text{
color:#94a3b8;
font-size:14px;
}

/* MOBILE MENU BUTTON */
.menu-toggle{
display:none;
font-size:22px;
cursor:pointer;
}

/* MAIN */
main{
max-width:1100px;
margin:auto;
padding:30px 20px;
}

/* MOBILE */
@media(max-width:768px){

.menu-toggle{
display:block;
}

/* dropdown menu */
.nav-links{
position:absolute;
top:60px;
left:0;
width:100%;
background:#020617;
flex-direction:column;
align-items:center;
gap:15px;
padding:15px 0;
display:none;
}

/* show menu */
.nav-links.active{
display:flex;
}

/* hide desktop buttons */
.nav-right{
display:none;
}

}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<div class="nav-container">

<!-- LOGO -->
<div class="logo">
Fit<span>Track</span>
</div>

<!-- MOBILE MENU BUTTON -->
<div class="menu-toggle" onclick="toggleMenu()">
☰
</div>

<!-- NAV LINKS -->
<div class="nav-links">
<!-- NAV LINKS -->


<a href="{% url 'home' %}">Home</a>
<a href="{% url 'exercise_hub' %}">Workouts</a>
<a href="{% url 'nutrition' %}">Diet Plan</a>
<a href="{% url 'digibook' %}">Progress</a>

<!-- ✅ FIXED -->
<a href="/chatapp/">AI Coach</a>

<a href="{% url 'home' %}#contact">Contact</a>

<!-- MOBILE AUTH -->
{% if user.is_authenticated %}
<a href="{% url 'profile' %}">Profile</a>
<a href="{% url 'logout' %}">Logout</a>
{% else %}
<a href="{% url 'login' %}">Login</a>
{% endif %}

</div>

<!-- DESKTOP RIGHT SIDE -->
<div class="nav-right">

{% if user.is_authenticated %}

<span class="user-text">
<button class="nav-btn secondary">Hello, {{ user.username }}</button>
<!--    Hello, {{ user.username }}-->
</span>

<!--<a href="{% url 'profile' %}">-->
<!--<button class="nav-btn secondary">Profile</button>-->
<!--</a>-->

<!--<a href="/chatapp/">-->
<!--    <button class="nav-btn">AI Coach</button>-->
<!--</a>-->

<!--<a href="{% url 'logout' %}">-->
<!--<button class="nav-btn">Logout</button>-->
<!--</a>-->

{% else %}

<a href="{% url 'login' %}">
<button class="nav-btn">Login</button>
</a>

{% endif %}

</div>

</div>
</nav>

<!-- CONTENT -->
<main>
{% block content %}
{% endblock %}
</main>

<!-- JS -->
<script>
function toggleMenu(){
    document.querySelector(".nav-links").classList.toggle("active");
}
</script>

</body>
</html>
