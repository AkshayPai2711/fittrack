{% extends "base.html" %}
{% block content %}

<style>

.container{
max-width:500px;
margin:auto;
padding:30px;
}

.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.08);
}

h2{
margin-bottom:15px;
}

input, textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.03);
color:white;
}

textarea{
resize:none;
height:100px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#22c55e;
color:#020617;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.preview{
margin-top:10px;
}

.preview img, .preview video{
width:100%;
border-radius:10px;
margin-top:10px;
}

</style>

<div class="container">

<div class="card">

<h2>Create Post</h2>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<label>Upload Image</label>
<input type="file" name="image" id="imageInput">

<label>OR Upload Video</label>
<input type="file" name="video" id="videoInput">

<label>Caption</label>
<textarea name="caption" placeholder="Write something..."></textarea>

<button type="submit">Post</button>

</form>

<div class="preview" id="preview"></div>

</div>

</div>

<script>

// Preview image/video before upload

const imageInput = document.getElementById("imageInput");
const videoInput = document.getElementById("videoInput");
const preview = document.getElementById("preview");

imageInput.onchange = function(e){
    const file = e.target.files[0];
    preview.innerHTML = `<img src="${URL.createObjectURL(file)}">`;
}

videoInput.onchange = function(e){
    const file = e.target.files[0];
    preview.innerHTML = `
        <video controls>
            <source src="${URL.createObjectURL(file)}">
        </video>`;
}

</script>

{% endblock %}
