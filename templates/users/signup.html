<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack – Sign Up</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f172a, #020617);
        color: white;
    }

    .container {
        width: 100%;
        max-width: 420px;
        padding: 20px;
    }

    .signup-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 35px 30px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        border: 1px solid rgba(255,255,255,0.08);
        animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .logo {
        text-align: center;
        margin-bottom: 20px;
    }

    .logo h1 {
        font-size: 28px;
        font-weight: 700;
    }

    .logo span {
        color: #22c55e;
    }

    .subtitle {
        text-align: center;
        font-size: 14px;
        color: #94a3b8;
        margin-bottom: 28px;
    }

    .input-group {
        margin-bottom: 16px;
    }

    .input-group label {
        display: block;
        font-size: 13px;
        margin-bottom: 6px;
        color: #cbd5f5;
    }

    .input-field {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.03);
        color: white;
        outline: none;
        transition: 0.25s;
    }

    .input-field:focus {
        border-color: #22c55e;
        box-shadow: 0 0 0 2px rgba(34,197,94,0.2);
    }

    .signup-btn {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        background: #22c55e;
        color: #020617;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
        transition: 0.25s;
        margin-top: 10px;
    }

    .signup-btn:hover {
        background: #16a34a;
        transform: translateY(-1px);
    }

    .login-link {
        text-align: center;
        font-size: 13px;
        color: #94a3b8;
        margin-top: 22px;
    }

    .login-link a {
        color: #22c55e;
        text-decoration: none;
        font-weight: 500;
    }

    @media (min-width: 768px) {
        body {
            background: radial-gradient(circle at top, #1e293b, #020617);
        }
    }
</style>
</head>

<body>
<div class="container">
    <div class="signup-card">
        <div class="logo">
            <h1>Fit<span>Track</span></h1>
        </div>
        <p class="subtitle">Create your account & start your fitness journey</p>
        <form method="POST">
{% csrf_token %}

<div class="input-group">
<label>Full Name</label>
<input type="text" name="username" class="input-field" placeholder="Enter your name">
</div>

<div class="input-group">
<label>Email</label>
<input type="email" name="email" class="input-field" placeholder="Enter your email">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" name="password" class="input-field" placeholder="Create password">
</div>

<div class="input-group">
<label>Confirm Password</label>
<input type="password" name="confirm" class="input-field" placeholder="Confirm password">
</div>

<button class="signup-btn" type="submit">Sign Up</button>

</form>

        <div class="login-link">
            Already have an account? <a href="/login">Login</a>
        </div>
    </div>
</div>

<script>
    function validateSignup() {
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const confirm = document.getElementById("confirm").value.trim();

        if (!name || !email || !password || !confirm) {
            alert("Please fill in all fields.");
            return false;
        }

        if (password.length < 6) {
            alert("Password must be at least 6 characters.");
            return false;
        }

        if (password !== confirm) {
            alert("Passwords do not match.");
            return false;
        }

        return true;
    }
</script>
</body>
</html>
