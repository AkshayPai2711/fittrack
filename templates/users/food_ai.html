{% extends "base.html" %}
{% block content %}

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

h1 span{
color:#22c55e;
}

.subtitle{
color:#94a3b8;
margin-bottom:25px;
}

.card{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.05);
border-radius:16px;
padding:25px;
margin-bottom:25px;
}

button{
background:#22c55e;
border:none;
padding:10px 18px;
border-radius:10px;
font-weight:600;
cursor:pointer;
color:#020617;
margin-top:10px;
}

#preview{
width:100%;
max-height:300px;
object-fit:contain;
margin-top:15px;
border-radius:12px;
display:none;
}

.result-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-top:20px;
}

.result-box{
background:rgba(255,255,255,0.03);
border-radius:10px;
padding:15px;
text-align:center;
}

.result-box h3{
font-size:14px;
color:#94a3b8;
}

.result-box p{
font-size:20px;
color:#22c55e;
font-weight:600;
margin-top:5px;
}

.loader{
margin-top:10px;
color:#94a3b8;
}

select{
padding:8px;
margin-top:10px;
border-radius:8px;
border:none;
}
.upload-area{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:10px;
}

.upload-btn{
background:#22c55e;
color:#020617;
padding:12px 20px;
border-radius:10px;
font-weight:600;
cursor:pointer;
display:inline-block;
transition:0.2s;
}

.upload-btn:hover{
background:#16a34a;
}

.camera-btn{
background:rgba(255,255,255,0.05);
color:white;
padding:12px 20px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.1);
}

.camera-btn:hover{
border-color:#22c55e;
}

#imageUpload{
display:none;
}
</style>

<div class="container">

<h1>Fit<span>Track</span> Food AI</h1>
<p class="subtitle">Upload or capture food to estimate calories & nutrition</p>

<div class="card">

<div class="upload-area">

<label for="imageUpload" class="upload-btn">
📷 Upload Food Photo
</label>

<input type="file" id="imageUpload" accept="image/*">

<button onclick="openCamera()" class="camera-btn">
🎥 Use Camera
</button>

</div>

<video id="camera" width="100%" autoplay style="display:none;margin-top:15px;border-radius:12px;"></video>

<button onclick="capture()" id="captureBtn" style="display:none">Capture Photo</button>

<img id="preview">

<div class="loader" id="loading"></div>

</div>



<div class="card">

<h2>Nutrition Estimate</h2>

<div class="result-grid">

<div class="result-box">
<h3>Food</h3>
<p id="food">-</p>
</div>

<div class="result-box">
<h3>Confidence</h3>
<p id="confidence">-</p>
</div>

<div class="result-box">
<h3>Calories</h3>
<p id="calories">-</p>
</div>

<div class="result-box">
<h3>Protein</h3>
<p id="protein">-</p>
</div>

<div class="result-box">
<h3>Carbs</h3>
<p id="carbs">-</p>
</div>

<div class="result-box">
<h3>Fat</h3>
<p id="fat">-</p>
</div>

</div>

<!--<button onclick="addLog()">Add To Daily Log</button>-->

</div>

</div>

<script>

let model;

async function loadModel(){
model = await mobilenet.load();
}

loadModel();

const foodDB={

pizza:{cal:285,protein:12,carbs:36,fat:10},
burger:{cal:295,protein:17,carbs:30,fat:12},
sandwich:{cal:250,protein:14,carbs:30,fat:7},
apple:{cal:95,protein:0.5,carbs:25,fat:0.3},
banana:{cal:105,protein:1.3,carbs:27,fat:0.4},
rice:{cal:206,protein:4,carbs:45,fat:0.5},
salad:{cal:150,protein:5,carbs:12,fat:8},
pasta:{cal:220,protein:8,carbs:42,fat:2},
cake:{cal:350,protein:5,carbs:50,fat:15}

};

document.getElementById("imageUpload").addEventListener("change",async function(e){

const file=e.target.files[0];

const img=document.getElementById("preview");

img.src=URL.createObjectURL(file);

img.style.display="block";

document.getElementById("loading").innerText="Analyzing food...";

await new Promise(r=>img.onload=r);

analyze(img);

});

async function analyze(img){

const predictions=await model.classify(img);

const food=predictions[0].className.split(",")[0].toLowerCase();

const confidence=(predictions[0].probability*100).toFixed(1)+"%";

document.getElementById("food").innerText=food;
document.getElementById("confidence").innerText=confidence;

let data={cal:200,protein:10,carbs:25,fat:8};

for(let key in foodDB){

if(food.includes(key)){
data=foodDB[key];
}

}

document.getElementById("calories").innerText=data.cal+" kcal";
document.getElementById("protein").innerText=data.protein+" g";
document.getElementById("carbs").innerText=data.carbs+" g";
document.getElementById("fat").innerText=data.fat+" g";
document.getElementById("loading").innerText="";

}

let stream;

async function openCamera(){

const video=document.getElementById("camera");

stream=await navigator.mediaDevices.getUserMedia({video:true});

video.srcObject=stream;

video.style.display="block";

document.getElementById("captureBtn").style.display="inline-block";

}

function capture(){

const video=document.getElementById("camera");

const canvas=document.createElement("canvas");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

canvas.getContext("2d").drawImage(video,0,0);

const img=document.getElementById("preview");

img.src=canvas.toDataURL();

img.style.display="block";

analyze(img);

}

function addLog(){

alert("Food added to daily calorie log!");

}

</script>

{% endblock %}
