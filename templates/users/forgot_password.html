<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack – Forgot Password</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

.container{
width:100%;
max-width:420px;
padding:20px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:20px;
padding:35px 30px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.08);
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo h1{
font-size:28px;
font-weight:700;
}

.logo span{
color:#22c55e;
}

.subtitle{
text-align:center;
font-size:14px;
color:#94a3b8;
margin-bottom:30px;
}

.input-group{
margin-bottom:18px;
}

.input-group label{
font-size:13px;
margin-bottom:6px;
display:block;
color:#cbd5f5;
}

.input-field{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.03);
color:white;
outline:none;
}

.btn{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#22c55e;
color:#020617;
font-weight:600;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="logo">
<h1>Fit<span>Track</span></h1>
</div>

<p class="subtitle">Verify your account</p>

<form method="POST">
{% csrf_token %}

<div class="input-group">
<label>Username</label>
<input type="text" name="username" class="input-field" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" name="email" class="input-field" required>
</div>

<button class="btn">Send OTP</button>

</form>

</div>
</div>

</body>
</html>
